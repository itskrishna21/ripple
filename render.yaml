databases:
  - name: ripple-db
    databaseName: ripple
    user: ripple
    plan: free

services:
  # ── Web API ──────────────────────────────────────────────────────────────
  - type: web
    name: ripple-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build && npm run migrate
    startCommand: npm run start:web
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROCESS_TYPE
        value: web
      - key: DATABASE_URL
        fromDatabase:
          name: ripple-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info

  # ── Worker ───────────────────────────────────────────────────────────────
  - type: worker
    name: ripple-worker
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROCESS_TYPE
        value: worker
      - key: DATABASE_URL
        fromDatabase:
          name: ripple-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: LOG_LEVEL
        value: info

  # ── Scheduler ────────────────────────────────────────────────────────────
  - type: worker
    name: ripple-scheduler
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:scheduler
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROCESS_TYPE
        value: scheduler
      - key: DATABASE_URL
        fromDatabase:
          name: ripple-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
